# .ai/config/profiles.yaml
standard:
  phases: [requirements, design, test-plan]
  human_gates: [requirements]
  max_reentry: 3
  required_artifacts:
    requirements:
      - PRD.md
      - user-stories.md
      - acceptance-criteria.md
      - review-log.md
    design:
      - architecture.md
      - review-log.md
    test-plan:
      - test-strategy.md
      - test-cases.md
      - review-log.md

