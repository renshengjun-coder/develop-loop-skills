      - test-plan
      - implementation
      - code-review
      - test-report
      - release
    human_gates:
      - requirements
      - design
      - test-plan
      - code-review
      - test-report
      - release
    max_reentry: 3
    required_artifacts:
      requirements:
        - PRD.md
        - user-stories.md
